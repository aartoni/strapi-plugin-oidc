services:
  cms:
    build: .
    container_name: cms
    environment:
      - OIDC_AUTHORIZATION_ENDPOINT=https://${AUTH_DOMAIN}/api/oidc/authorization
      - OIDC_TOKEN_ENDPOINT=https://${AUTH_DOMAIN}/api/oidc/token
      - OIDC_USER_INFO_ENDPOINT=https://${AUTH_DOMAIN}/api/oidc/userinfo
      - OIDC_REDIRECT_URI=https://${CMS_DOMAIN}/api/strapi-plugin-sso/oidc/callback
      # TODO Should we load the client ID + secret from secrets instead?
      - OIDC_CLIENT_ID=onbU2exrz2I0RCJRrXsCQj49dgLFHLppCekGGdKmBaQ_7MWpAKcnylw6kO-7lUhsUtzmGJM8
      - OIDC_CLIENT_SECRET=yebsr4POK_hXenANvvo4DAHBGPIP_3a0
      # TODO Should we load them from env in Authelia as well? If so, maybe we should move them to .env
      - OIDC_SCOPES=openid profile email groups
      # Trust the dev CA so Node's fetch can reach Authelia over self-signed TLS.
      - NODE_EXTRA_CA_CERTS=/run/certs/fullchain.pem
    volumes:
      - './data/common/certs/fullchain.pem:/run/certs/fullchain.pem:ro'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1337/admin/init"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - 1337
  proxy:
    image: nginx:1.27-alpine
    container_name: proxy
    hostname: ${DOMAIN}
    networks:
      default:
        aliases:
          - ${CMS_DOMAIN}
          - ${AUTH_DOMAIN}
    depends_on:
      - idp
      - cms
    environment:
      - AUTH_DOMAIN
      - CMS_DOMAIN
      - DOMAIN
    ports:
      - "80:80"
      - "443:443"
    restart: "unless-stopped"
    volumes:
      - './config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './config/nginx/snippets:/etc/nginx/snippets:ro'
      - './config/nginx/templates:/etc/nginx/templates:ro'
      - './data/common/certs/fullchain.pem:/config/keys/cert.crt:ro'
      - './data/common/certs/serverkey.pem:/config/keys/cert.key:ro'
  idp:
    image: "authelia/authelia:4.39"
    container_name: idp
    environment:
      - AUTH_DOMAIN
      - CMS_DOMAIN
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE=/run/secrets/hmac_secret
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/run/secrets/jwt_secret
      - AUTHELIA_SESSION_SECRET_FILE=/run/secrets/auth_session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/run/secrets/auth_storage_key
      - DOMAIN
      - ORGANIZATION_NAME=Strapi OIDC
      - X_AUTHELIA_CONFIG_FILTERS=template
    expose:
      - 9091
    restart: "unless-stopped"
    secrets:
      - auth_session_secret
      - auth_storage_key
      - hmac_secret
      - jwks_key
      - jwt_secret
      - oidc_strapi_id
      - oidc_strapi_digest
    volumes:
      - ./config/authelia/configuration.yml:/config/configuration.yml:ro
      - ./config/authelia/users.yml:/config/users.yml:ro

secrets:
  auth_session_secret:
    file: ./config/authelia/secrets/session-secret.txt
  auth_storage_key:
    file: ./config/authelia/secrets/storage-key.txt
  hmac_secret:
    file: ./config/authelia/secrets/hmac-secret.txt
  jwks_key:
    file: ./config/authelia/secrets/jwks-key.pem
  jwt_secret:
    file: ./config/authelia/secrets/jwt-secret.txt
  oidc_strapi_id:
    file: ./config/authelia/secrets/clients/strapi_id.txt
  oidc_strapi_digest:
    file: ./config/authelia/secrets/clients/strapi_digest.txt
