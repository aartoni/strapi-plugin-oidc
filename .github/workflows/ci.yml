name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Plugin builds + lints across its full supported Node range (engines: 22–24).
  lint-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn build

  # Jest unit + integration.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            playground/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn yalc publish --private
      - run: yarn playground:install
      - run: yarn playground:build
      - run: yarn test:jest

  # Cypress e2e against the running playground.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Start e2e services
        run: yarn e2e:services:up
      - name: Run cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: yarn test:cypress
      - name: Dump Docker logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop e2e services
        if: always()
        run: yarn e2e:services:down
